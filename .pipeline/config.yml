general:
  buildTool: maven
  dockerImage: "maven:3.9.6-eclipse-temurin-21"

steps:
  mavenExecute:
    goals:
      - "compile"
      - "test-compile"
      - "package"
    m2Path: ".m2/repository"

  mavenTest:
    goals:
      - "test"
    m2Path: ".m2/repository"

  mavenCoverage:
    goals:
      - "jacoco:report"
    m2Path: ".m2/repository"
