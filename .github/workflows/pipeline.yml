name: CI Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Maven repository
        run: |
          mkdir -p /home/runner/.m2/repository
          chmod -R 755 /home/runner/.m2

      - name: Maven Build using Piper
        uses: SAP/project-piper-action@v1.26.2
        with:
          step-name: mavenExecute
        env:
          PIPER_ciMode: "true"
          WORKSPACE: ${{ github.workspace }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: gha-demo-jar
          path: target/*.jar