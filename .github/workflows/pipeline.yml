name: Java CI with Maven

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
      - name: Creating Writable Maven Repo
        run: |
          mkdir -p .m2
          chmod -R 777 .m2

      - name: Using secret as environment variable
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: echo "Secret value is $MY_SECRET"

      - name: Run Piper Maven Build
        uses: SAP/project-piper-action@v1.26.2
        with:
          step-name: mavenExecute
        env:
          HOME: ${{ github.workspace }}
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Run Tests
        uses: SAP/project-piper-action@v1.26.2
        with:
          step-name: mavenTest
        env:
          HOME: ${{ github.workspace }}
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Generate Coverage
        uses: SAP/project-piper-action@v1.26.2
        with:
          step-name: mavenCoverage
          flags: "jacoco:report"
        env:
          HOME: ${{ github.workspace }}
          PROJECT_ROOT: ${{ github.workspace }}
