name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Using secret as environment variable
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: echo "Secret value is $MY_SECRET"
      - uses: SAP/project-piper-action@master
        name: Run Piper Maven Build
        with:
          step-name: mavenExecute
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gha-demo-jar
          path: target/*.jar
      - name: Upload Target Directory for Tests
        uses: actions/upload-artifact@v4
        with:
          name: target-classes
          path: target/

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Download Target Directory
        uses: actions/download-artifact@v4
        with:
          name: target-classes
          path: target/classes/
      - uses: SAP/project-piper-action@master
        name: Run Tests
        with:
          step-name: mavenTest
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Download Target Directory
        uses: actions/download-artifact@v4
        with:
          name: target-classes
          path: target/
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
      - uses: SAP/project-piper-action@master
        name: Generate Coverage Report
        with:
          step-name: mavenCoverage
          flags: 'jacoco:report'
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: target/site/jacoco/
