name: Java CI with Maven + Piper

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create Maven local repository directory
        run: |
          mkdir -p $HOME/.m2/repository
          chmod -R 755 $HOME/.m2

      - name: Use Secret
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          MAVEN_OPTS: "-Dmaven.repo.local=$HOME/.m2/repository"
        run: echo "Secret successfully loaded"

      - name: Maven Build using Piper
        uses: SAP/project-piper-action@v1.26.0
        env:
          MAVEN_OPTS: "-Dmaven.repo.local=$HOME/.m2/repository"
        with:
          step-name: mavenExecute
          flags: "--goals clean package"

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gha-demo-jar
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create Maven local repository directory
        run: |
          mkdir -p $HOME/.m2/repository
          chmod -R 755 $HOME/.m2

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: gha-demo-jar
          path: target/

      - name: Run Tests
        env:
          MAVEN_OPTS: "-Dmaven.repo.local=$HOME/.m2/repository"
        run: mvn test

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create Maven local repository directory
        run: |
          mkdir -p $HOME/.m2/repository
          chmod -R 755 $HOME/.m2

      - name: Generate Coverage Report
        env:
          MAVEN_OPTS: "-Dmaven.repo.local=$HOME/.m2/repository"
        run: mvn jacoco:report