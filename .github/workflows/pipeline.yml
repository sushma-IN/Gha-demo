name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Using secret as environment variable
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: echo "Secret value is $MY_SECRET"

      - name: Run Piper Maven Build
        uses: SAP/project-piper-action@v1.26.2
        with:
          step-name: mavenExecute

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gha-demo-jar
          path: target/*.jar