name: CI Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run Maven build with Piper
        uses: SAP/project-piper-action@v1.26.2
        with:
          step-name: mavenExecute

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: gha-demo-jar
          path: target/*.jar