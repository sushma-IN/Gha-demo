name: Java CI with Maven + Piper

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Use Secret
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: echo "Secret successfully loaded"

      - name: Maven Build using Piper
        uses: SAP/project-piper-action@v1.26.0
        with:
          step-name: mavenExecute
          flags: "--goals clean package"
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gha-demo-jar
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4

        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: mvn test

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Generate Coverage Report
        run: mvn jacoco:report